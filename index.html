<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>愛知大学出席管理スキャナ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; background: #f8f9fa; color: #333; }
    .header { background: #007bff; color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }
    #reader { width: 95%; max-width: 400px; margin: 10px auto; background: white; border-radius: 8px; overflow: hidden; min-height: 250px; }
    #msg { font-size: 1.1rem; font-weight: bold; padding: 20px; min-height: 60px; line-height: 1.5; word-wrap: break-word; }
    .btn-container { padding-top: 50px; }
    .btn { display: block; width: 80%; max-width: 300px; margin: 20px auto; padding: 20px; font-size: 1.2rem; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; }
    .btn-univ { background: #28a745; }
    .btn-outside { background: #fd7e14; }
    .btn-retry { background: #6c757d; color: white; padding: 10px 20px; border-radius: 8px; border: none; margin-top: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">愛知大学出席管理スキャナ</div>
  
  <div id="setup" class="btn-container">
    <button class="btn btn-univ" onclick="selectMode('univ')">🏫 大学内</button>
    <button class="btn btn-outside" onclick="selectMode('outside')">🏃 大学外</button>
  </div>

  <div id="scan-container" style="display:none;">
    <div id="msg">カメラ準備中...</div>
    <div id="reader"></div>
    <button class="btn-retry" onclick="resetPage()">↺ 最初に戻る</button>
  </div>

  <script>
    // あなたのGAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzgGjGsR7_lT48L5oQsWnly3BS0iIgL8jElHTmmGO7MrgVAIph4EmUT4EM_tS_hT2rpDg/exec";
    
    let html5QrCode = null;
    let selectedMode = "";
    let recentlyScanned = []; 
    
    // GPS監視用の変数
    let watchId = null;
    let latestLat = null;
    let latestLng = null;
    let isCameraStarted = false;
    
    // 大学の座標設定
    const UNIV_LAT = 34.743429; 
    const UNIV_LNG = 137.388910; 
    const ALLOWED_RADIUS = 500;

    function selectMode(mode) {
      selectedMode = mode;
      document.getElementById('setup').style.display = 'none';
      document.getElementById('scan-container').style.display = 'block';
      
      if (mode === 'univ') {
        document.getElementById('msg').innerText = "📍 位置情報を確認中...";
        
        // ▼ 変更点：GPSを裏側で「常に」監視し続ける ▼
        watchId = navigator.geolocation.watchPosition(
          (pos) => {
            // 常に最新の座標をアップデート
            latestLat = pos.coords.latitude;
            latestLng = pos.coords.longitude;
            const dist = getDistance(latestLat, latestLng, UNIV_LAT, UNIV_LNG);

            // まだカメラが起動していない（初回）の場合のみチェックして起動
            if (!isCameraStarted) {
              if (dist <= ALLOWED_RADIUS) {
                isCameraStarted = true;
                startCamera(); 
              } else {
                document.getElementById('msg').innerText = `❌ 範囲外です (${Math.round(dist)}m)`;
                document.getElementById('msg').style.color = "red";
              }
            }
          },
          () => { 
            if (!isCameraStarted) {
              document.getElementById('msg').innerText = "❌ 位置情報を許可してください";
              document.getElementById('msg').style.color = "red";
            }
          },
          { enableHighAccuracy: true, maximumAge: 5000, timeout: 5000 }
        );
      } else {
        isCameraStarted = true;
        startCamera(); 
      }
    }

    function startCamera() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .then(() => { 
          document.getElementById('msg').innerText = "QRをかざしてください";
          document.getElementById('msg').style.color = "#333";
        })
        .catch((err) => { 
          document.getElementById('msg').innerText = "カメラ起動エラー: カメラを許可してください";
          document.getElementById('msg').style.color = "red";
        });
    }

    function resetPage() {
      // 監視もストップする
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      isCameraStarted = false;

      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(finalizeReset).catch(finalizeReset);
      } else {
        finalizeReset();
      }
    }

    function finalizeReset() {
      document.getElementById('scan-container').style.display = 'none';
      document.getElementById('setup').style.display = 'block';
      document.getElementById('msg').innerText = "カメラ準備中...";
      document.getElementById('msg').style.color = "#333";
      selectedMode = "";
      recentlyScanned = []; 
    }

    function onScanSuccess(decodedText) {
      if (recentlyScanned.includes(decodedText)) return;

      // ▼ 変更点：スキャンした瞬間に「最新の監視データ」を見て、持ち出されていないか判定 ▼
      if (selectedMode === 'univ' && latestLat !== null) {
        const dist = getDistance(latestLat, latestLng, UNIV_LAT, UNIV_LNG);
        if (dist > ALLOWED_RADIUS) {
          // 範囲外なら送信せずにエラー表示！
          const msgDiv = document.getElementById('msg');
          msgDiv.innerText = `❌ 持ち出しを検知しました (${Math.round(dist)}m)`;
          msgDiv.style.color = "red";
          
          // 2秒後に元の表示に戻す
          setTimeout(() => {
            if (msgDiv.innerText.includes("持ち出し")) {
              msgDiv.innerText = "次のQRをかざしてください";
              msgDiv.style.color = "#333";
            }
          }, 2000);
          return; // ここで処理を止める（GASには送らない）
        }
      }

      recentlyScanned.push(decodedText);
      setTimeout(() => {
        recentlyScanned = recentlyScanned.filter(item => item !== decodedText);
      }, 5000);

      const msgDiv = document.getElementById('msg');
      msgDiv.innerText = "🔄 通信中...";
      msgDiv.style.color = "#007bff"; 

      sendToGasInBackground(decodedText);
    }

    function sendToGasInBackground(decodedText) {
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ qrData: decodedText, mode: selectedMode })
      })
      .then(response => response.text())
      .then(res => {
        const msgDiv = document.getElementById('msg');
        msgDiv.innerText = res;
        
        if (res.includes("遅刻")) {
          msgDiv.style.color = "#fd7e14"; 
        } else if (res.includes("❌") || res.includes("エラー")) {
          msgDiv.style.color = "#d9534f"; 
        } else {
          msgDiv.style.color = "#28a745"; 
        }

        setTimeout(() => {
          if (msgDiv.innerText === res) {
            msgDiv.innerText = "次のQRをかざしてください";
            msgDiv.style.color = "#333";
          }
        }, 1000);
      })
      .catch(err => {
        const msgDiv = document.getElementById('msg');
        msgDiv.innerText = "❌ 通信エラーが発生しました";
        msgDiv.style.color = "red";
        
        setTimeout(() => {
          if (msgDiv.innerText.includes("エラー")) {
            msgDiv.innerText = "次のQRをかざしてください";
            msgDiv.style.color = "#333";
          }
        }, 1000);
      });
    }

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
  </script>
</body>
</html>
